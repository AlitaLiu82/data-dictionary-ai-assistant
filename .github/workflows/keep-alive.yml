name: Keep Streamlit App Alive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App
        run: |
          echo "Pinging Streamlit app..."
          curl -L -I https://data-dictionary-ai-assistant-ih4u7r9stgzjyrkyliwtxm.streamlit.app/
          sleep 5
          curl -L https://data-dictionary-ai-assistant-ih4u7r9stgzjyrkyliwtxm.streamlit.app/ > /dev/null 2>&1
          echo "App pinged successfully at $(date)"
