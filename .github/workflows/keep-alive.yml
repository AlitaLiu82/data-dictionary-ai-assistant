name: Keep Streamlit App Alive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App
        run: |
          echo "Pinging Streamlit app..."
          # First request - wake up the app
          curl -L -s -o /dev/null -w "HTTP Status: %{http_code}\n" https://data-dictionary-ai-assistant-ih4u7r9stgzjyrkyliwtxm.streamlit.app/ || true
          
          # Wait for app to fully start
          sleep 10
          
          # Second request - ensure it's warm
          curl -L -s -o /dev/null -w "HTTP Status: %{http_code}\n" https://data-dictionary-ai-assistant-ih4u7r9stgzjyrkyliwtxm.streamlit.app/ || true
          
          echo "✅ App pinged successfully at $(date)"
